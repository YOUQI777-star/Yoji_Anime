name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/rag/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE:    anime-kg-api
  REGION:     asia-southeast1
  IMAGE:      gcr.io/${{ secrets.GCP_PROJECT_ID }}/anime-kg-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 从项目根目录构建（Dockerfile 在根目录，包含 scripts/）
      - name: Build and push Docker image
        run: gcloud builds submit --tag $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 180 \
            --set-env-vars="PROJECT_ROOT=/app" \
            --set-env-vars="NEO4J_URI=${{ secrets.NEO4J_URI }}" \
            --set-env-vars="NEO4J_USER=${{ secrets.NEO4J_USER }}" \
            --set-env-vars="NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}" \
            --set-env-vars="NEO4J_DATABASE=${{ secrets.NEO4J_DATABASE }}" \
            --set-env-vars="BANGUMI_TOKEN=${{ secrets.BANGUMI_TOKEN }}" \
            --set-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe $SERVICE --region $REGION --format 'value(status.url)')
          curl -f $URL/health || exit 1
          echo "✓ Deployed to $URL"
