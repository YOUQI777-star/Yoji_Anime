<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOJI — Anime Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { overflow: auto; height: auto; }

    /* Scanline overlay — very subtle, not gimmicky */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Big corner mark */
    .corner-mark {
      position: fixed;
      bottom: 0; right: 0;
      width: 120px; height: 120px;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      pointer-events: none;
      opacity: 0.4;
    }
    .corner-mark::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 6px; height: 6px;
      background: var(--red);
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<!-- ── Nav ───────────────────────────────────────── -->
<nav class="welcome-nav" style="position:sticky;top:0;z-index:100;background:var(--bg)">
  <a class="nav-logo" href="index.html">YOJI</a>
  <div class="welcome-nav-right" id="nav-user"></div>
</nav>

<!-- ── Main ──────────────────────────────────────── -->
<main class="welcome-main">
  <div class="welcome-content">

    <div class="welcome-eyebrow">System v1.0 — Knowledge Graph</div>

    <h1 class="welcome-title">
      ANIME<br>
      <em>GRAPH</em>
    </h1>
    <p class="welcome-sub">探索动漫世界的关系网络</p>

    <div class="welcome-rule"></div>

    <p class="welcome-desc">
      连接动漫、角色、声优、标签与制作公司之间的隐性关联。
      搜索任意词条，展开节点，发现推荐，提问 AI。
    </p>

    <div class="welcome-actions">
      <a href="graph.html" class="btn btn-primary" style="padding:10px 24px;font-size:12px">
        ENTER SYSTEM →
      </a>
      <a href="graph.html" class="btn btn-ghost" onclick="this.href='graph.html?q=进击的巨人'">
        DEMO
      </a>
    </div>

  </div>
</main>

<!-- ── Footer ────────────────────────────────────── -->
<footer class="welcome-footer">
  <div class="welcome-meta">YOJI // ANIME-KG // 2026</div>
  <div style="display:flex;gap:20px">
    <div class="welcome-status" id="db-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-txt" style="font-family:var(--mono);font-size:10px;color:var(--muted)">CHECKING…</span>
    </div>
  </div>
</footer>

<!-- Decorative corner -->
<div class="corner-mark"></div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
  // Init shared (modal + nav user)
  document.addEventListener('DOMContentLoaded', () => {
    initShared();

    // Check backend status
    fetch(`${API_BASE}/health`)
      .then(r => r.json())
      .then(d => {
        document.getElementById('status-dot').className = 'status-dot online';
        document.getElementById('status-txt').textContent = 'BACKEND ONLINE';
      })
      .catch(() => {
        document.getElementById('status-dot').className = 'status-dot';
        document.getElementById('status-txt').textContent = 'BACKEND OFFLINE';
      });
  });
</script>
</body>
</html>
