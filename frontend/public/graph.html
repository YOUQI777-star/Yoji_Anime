<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOJI — Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
</head>
<body class="graph-page">

<!-- ══════════════════════════════════════════════════
     NAV
══════════════════════════════════════════════════ -->
<nav id="nav">
  <a class="nav-logo" href="index.html">YOJI</a>
  <div class="nav-sep"></div>

  <!-- Search -->
  <div class="nav-search-wrap">
    <input id="nav-search" class="nav-search" type="text"
           placeholder="搜索动漫、角色、声优…" autocomplete="off" />
    <div id="ac-list"></div>
  </div>

  <!-- Stats -->
  <span id="graph-stats" style="font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap">0N · 0E</span>

  <div class="nav-right" id="nav-user"></div>
</nav>

<!-- ══════════════════════════════════════════════════
     LAYOUT
══════════════════════════════════════════════════ -->
<div id="graph-layout">

  <!-- ── Left Panel ─────────────────────────────── -->
  <div id="lp">
    <div id="lp-inner">
      <!-- Tabs -->
      <div class="ptabs">
        <button class="ptab active" data-pane="search">SEARCH</button>
        <button class="ptab" data-pane="rec">REC</button>
        <button class="ptab" data-pane="cast">CAST</button>
        <button class="ptab" data-pane="niche">NICHE</button>
      </div>

      <div class="lp-scroll">

        <!-- ── SEARCH pane ──────────────────────── -->
        <div class="ptab-pane active" id="pane-search">
          <div class="form-group">
            <span class="pane-label">QUERY</span>
            <input id="search-input" class="input" type="text"
                   placeholder="name / ID / keyword"
                   onkeydown="if(event.key==='Enter') runSearchPane()" />
          </div>

          <div class="form-group">
            <span class="pane-label">SCOPE</span>
            <div class="seg-ctrl">
              <button class="seg-btn active scope-btn" data-scope="all">ALL</button>
              <button class="seg-btn scope-btn" data-scope="anime">ANIME</button>
              <button class="seg-btn scope-btn" data-scope="character">CHAR</button>
              <button class="seg-btn scope-btn" data-scope="va">VA</button>
            </div>
          </div>

          <div class="form-group">
            <span class="pane-label">DISPLAY LANG</span>
            <div class="seg-ctrl">
              <button class="seg-btn active lang-btn" data-lang="cn">中文</button>
              <button class="seg-btn lang-btn" data-lang="ori">ORIG</button>
            </div>
          </div>

          <button class="btn btn-primary btn-full" onclick="runSearchPane()">SEARCH →</button>
        </div>

        <!-- ── REC pane ─────────────────────────── -->
        <div class="ptab-pane" id="pane-rec">
          <div class="form-group">
            <span class="pane-label">ANIME NAME / ID</span>
            <input id="rec-input" class="input" type="text"
                   placeholder="e.g. 进击的巨人 or 38524"
                   onkeydown="if(event.key==='Enter') runRecommend()" />
          </div>
          <button class="btn btn-primary btn-full" onclick="runRecommend()">FIND SIMILAR →</button>

          <div style="margin-top:4px">
            <div class="pane-label" style="margin-bottom:6px">RESULTS</div>
            <div id="rec-results"></div>
          </div>
        </div>

        <!-- ── CAST pane ─────────────────────────── -->
        <div class="ptab-pane" id="pane-cast">
          <div>
            <span class="pane-label">SELECT TAGS</span>
            <span id="sel-tag-count" style="font-family:var(--mono);font-size:10px;color:var(--red);margin-left:8px"></span>
          </div>
          <div class="tag-pool" id="tag-pool">
            <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">LOADING…</span>
          </div>
          <button class="btn btn-primary btn-full" onclick="runCasting()">FIND VOICE ACTORS →</button>

          <div style="margin-top:4px">
            <div class="pane-label" style="margin-bottom:6px">TOP VA</div>
            <div id="cast-results"></div>
          </div>
        </div>

        <!-- ── NICHE pane ─────────────────────────── -->
        <div class="ptab-pane" id="pane-niche">
          <div class="form-group">
            <span class="pane-label">MIN RANK (popularity floor)</span>
            <div class="slider-row">
              <input type="range" id="niche-pop" min="100" max="5000" step="100" value="500" />
              <span class="slider-val" id="niche-pop-val">500</span>
            </div>
          </div>
          <div class="form-group">
            <span class="pane-label">MIN TAGS (richness)</span>
            <div class="slider-row">
              <input type="range" id="niche-rich" min="1" max="20" step="1" value="5" />
              <span class="slider-val" id="niche-rich-val">5</span>
            </div>
          </div>
          <button class="btn btn-primary btn-full" onclick="runNiche()">DISCOVER NICHE →</button>
        </div>

      </div><!-- /lp-scroll -->
    </div>
  </div><!-- /lp -->

  <!-- ── Graph Canvas ───────────────────────────── -->
  <div id="graph-wrap">
    <div id="cy"></div>

    <!-- Loading indicator -->
    <div class="graph-loading" id="graph-loading">
      <span class="spin"></span>
      <span>QUERYING…</span>
    </div>

    <!-- Legend -->
    <div id="graph-legend">
      <div class="legend-item">
        <span class="legend-dot" style="background:var(--c-anime)"></span>ANIME
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:var(--c-char)"></span>CHARACTER
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:var(--c-va)"></span>VOICE ACTOR
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:var(--c-tag);transform:rotate(45deg)"></span>TAG
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background:var(--c-studio)"></span>STUDIO
      </div>
    </div>

    <!-- Hint -->
    <div class="graph-hint">CLICK NODE TO INSPECT · SCROLL TO ZOOM</div>

    <!-- Toolbar -->
    <div class="graph-toolbar">
      <button class="tb-btn" onclick="toggleLP()" title="Toggle panel">☰</button>
      <button class="tb-btn" onclick="fitGraph()"  title="Fit to view">⊡</button>
      <button class="tb-btn" onclick="clearGraph()" title="Clear graph">✕</button>
    </div>
  </div><!-- /graph-wrap -->

  <!-- ── Right Panel ────────────────────────────── -->
  <div id="rp">
    <div id="rp-inner">
      <!-- Header -->
      <div class="rp-head">
        <div class="rp-title-area">
          <span class="rp-badge"></span>
          <div class="rp-name"></div>
        </div>
        <button class="rp-close" onclick="closeRightPanel()">×</button>
      </div>
      <!-- Scrollable content -->
      <div class="rp-scroll" id="rp-scroll"></div>
    </div>
  </div><!-- /rp -->

</div><!-- /graph-layout -->

<script src="config.js"></script>
<script src="app.js"></script>
<script src="graph.js"></script>
</body>
</html>
